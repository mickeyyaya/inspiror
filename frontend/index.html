<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/assets/app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4ecdc4" />
    <meta name="description" content="AI-powered coding for kids ages 8-12. Build games, apps, and animations with your Builder Buddy!" />
    <link rel="apple-touch-icon" href="/assets/app-icon.png" />
    <title>Inspiror - Build Anything!</title>
    <script>
      // Prevent FOUC: apply dark mode before React renders
      try {
        var d = localStorage.getItem('inspiror-dark-mode');
        if (d === 'true' || (d === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.setAttribute('data-dark', 'true');
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
